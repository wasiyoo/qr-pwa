<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f8b8d">
    <meta name="description" content="Generador y lector de codigos QR instalable como PWA.">
    <title>Herramienta QR PWA</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
    <script src="./vendor/qrcode.min.js" defer></script>
    <script src="./vendor/jsQR.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="./assets/icon.svg" alt="" width="44" height="44">
        <div>
          <p>QR PWA</p>
          <h1>Herramienta QR</h1>
        </div>
      </div>
      <button class="ghost-button" id="installButton" type="button" hidden>Instalar</button>
    </header>

    <main class="app-shell">
      <section class="tool-panel generator" aria-labelledby="generatorTitle">
        <div class="panel-heading">
          <div>
            <p>Generador</p>
            <h2 id="generatorTitle">Crear codigo QR</h2>
          </div>
          <span class="badge" id="qrQualityLabel">Alta correccion</span>
        </div>

        <div class="segmented" role="tablist" aria-label="Tipo de codigo QR">
          <button type="button" class="active" data-mode="text" role="tab" aria-selected="true">Texto</button>
          <button type="button" data-mode="wifi" role="tab" aria-selected="false">Wi-Fi</button>
          <button type="button" data-mode="contact" role="tab" aria-selected="false">Contacto</button>
          <button type="button" data-mode="whatsapp" role="tab" aria-selected="false">WhatsApp</button>
        </div>

        <div class="form-stack">
          <div class="mode-panel active" data-mode-panel="text">
            <label for="textPayload">Contenido</label>
            <textarea id="textPayload" rows="5" placeholder="Texto, enlace o dato para convertir en QR">https://github.com/</textarea>
          </div>

          <div class="mode-panel" data-mode-panel="wifi" hidden>
            <div class="field-grid">
              <div>
                <label for="wifiSsid">Red</label>
                <input id="wifiSsid" type="text" autocomplete="off" placeholder="Nombre de Wi-Fi">
              </div>
              <div>
                <label for="wifiPassword">Clave</label>
                <input id="wifiPassword" type="text" autocomplete="off" placeholder="Contrasena">
              </div>
              <div>
                <label for="wifiType">Seguridad</label>
                <select id="wifiType">
                  <option value="WPA">WPA/WPA2</option>
                  <option value="WEP">WEP</option>
                  <option value="nopass">Sin clave</option>
                </select>
              </div>
              <label class="check-row" for="wifiHidden">
                <input id="wifiHidden" type="checkbox">
                <span>Red oculta</span>
              </label>
            </div>
          </div>

          <div class="mode-panel" data-mode-panel="contact" hidden>
            <div class="field-grid">
              <div>
                <label for="contactName">Nombre</label>
                <input id="contactName" type="text" autocomplete="name" placeholder="Nombre completo">
              </div>
              <div>
                <label for="contactPhone">Telefono</label>
                <input id="contactPhone" type="tel" autocomplete="tel" placeholder="+591...">
              </div>
              <div>
                <label for="contactEmail">Correo</label>
                <input id="contactEmail" type="email" autocomplete="email" placeholder="correo@dominio.com">
              </div>
              <div>
                <label for="contactOrg">Empresa</label>
                <input id="contactOrg" type="text" autocomplete="organization" placeholder="Organizacion">
              </div>
            </div>
          </div>

          <div class="mode-panel" data-mode-panel="whatsapp" hidden>
            <div class="field-grid">
              <div>
                <label for="whatsappPhone">Numero</label>
                <input id="whatsappPhone" type="tel" inputmode="tel" placeholder="59170000000">
              </div>
              <div>
                <label for="whatsappMessage">Mensaje</label>
                <input id="whatsappMessage" type="text" placeholder="Mensaje inicial">
              </div>
            </div>
          </div>

          <div class="control-grid">
            <div>
              <label for="qrSize">Tamano</label>
              <input id="qrSize" type="range" min="180" max="360" step="20" value="280">
            </div>
            <div>
              <label for="qrCorrection">Correccion</label>
              <select id="qrCorrection">
                <option value="L">Baja</option>
                <option value="M">Media</option>
                <option value="Q">Alta</option>
                <option value="H" selected>Maxima</option>
              </select>
            </div>
            <div>
              <label for="qrColor">Color</label>
              <input id="qrColor" type="color" value="#111111">
            </div>
            <div>
              <label for="qrBgColor">Fondo</label>
              <input id="qrBgColor" type="color" value="#ffffff">
            </div>
          </div>
        </div>

        <div class="qr-workspace">
          <div class="qr-output" id="qrcode" aria-live="polite"></div>
          <div class="button-row">
            <button class="primary-button" id="generateButton" type="button">Generar</button>
            <button class="secondary-button" id="downloadButton" type="button">Descargar PNG</button>
            <button class="secondary-button" id="copyPayloadButton" type="button">Copiar contenido</button>
          </div>
        </div>
      </section>

      <section class="tool-panel scanner" aria-labelledby="scannerTitle">
        <div class="panel-heading">
          <div>
            <p>Lector</p>
            <h2 id="scannerTitle">Escanear codigo QR</h2>
          </div>
          <span class="badge muted" id="readerState">Camara inactiva</span>
        </div>

        <div class="camera-frame" id="cameraFrame">
          <video id="cameraPreview" muted playsinline></video>
          <div class="scan-target" aria-hidden="true"></div>
          <canvas id="scanCanvas" hidden></canvas>
        </div>

        <div class="scanner-controls">
          <select id="cameraSelect" aria-label="Seleccionar camara" hidden></select>
          <div class="button-row">
            <button class="primary-button" id="startCameraButton" type="button">Iniciar camara</button>
            <button class="secondary-button" id="stopCameraButton" type="button" disabled>Detener</button>
            <label class="secondary-button file-button" for="imageInput">
              Leer imagen
              <input id="imageInput" type="file" accept="image/*" hidden>
            </label>
          </div>
        </div>

        <div class="result-box" id="resultBox" hidden>
          <p>Contenido detectado</p>
          <output id="resultText"></output>
          <div class="button-row" id="resultActions"></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span id="appStatus">Lista para trabajar.</span>
    </footer>
  </body>
</html>
